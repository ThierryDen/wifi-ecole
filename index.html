<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Réseau wifi ELEVES</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: transparent;
      padding: 0;
    }

    .card {
      padding: 4px 0;
      width: 100%;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 2px;
    }

    .date {
      font-size: 12px;
      color: #8a94a6;
      margin-bottom: 10px;
    }

    .field {
      font-size: 14px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .field span {
      font-weight: 700;
      font-family: 'Courier New', monospace;
    }

    .error {
      font-size: 13px;
      color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="content">Chargement…</div>
  </div>

  <script>
    // ⚠️ REMPLACE CETTE URL par la tienne (ton compte et ton dépôt GitHub)
    const WIFI_JSON_URL = 'https://thierryden.github.io/wifi-ecole/wifi.json';

    async function load() {
      try {
        const res = await fetch(WIFI_JSON_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error();
        const data = await res.json();

        const dateStr = data.updated
          ? new Date(data.updated).toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
          : new Date().toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        document.getElementById('content').innerHTML = `
          <h1>Accès WiFi du jour</h1>
          <p class="date">${dateStr}</p>
          <p class="field">Identifiant : <span>${data.login}</span></p>
          <p class="field">Mot de passe : <span>${data.password}</span></p>
        `;
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<p class="error">Codes indisponibles – contacter le secrétariat.</p>';
      }
    }

    load();
    setInterval(load, 30 * 60 * 1000);
  </script>
</body>
</html>
