<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>WiFi Élèves – Accès du jour</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 28px 32px;
      max-width: 420px;
      width: 100%;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e8ecf0;
    }

    .wifi-icon {
      width: 40px;
      height: 40px;
      background: #e8f0fe;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .wifi-icon svg { color: #3367d6; }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .header-text p {
      font-size: 13px;
      color: #6b7a99;
      margin-top: 2px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8a94a6;
      margin-bottom: 6px;
    }

    .field-value {
      background: #f7f9fc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .field-value span {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.04em;
      font-family: 'Courier New', monospace;
    }

    .copy-btn {
      background: none;
      border: 1px solid #d0d7e3;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #6b7a99;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      background: #e8f0fe;
      border-color: #3367d6;
      color: #3367d6;
    }

    .copy-btn.copied {
      background: #e6f4ea;
      border-color: #34a853;
      color: #34a853;
    }

    .ssid-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e8f0fe;
      color: #1a56c4;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .ssid-badge::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #34a853;
      border-radius: 50%;
    }

    .footer {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid #e8ecf0;
      font-size: 12px;
      color: #a0aab8;
      text-align: center;
    }

    .error {
      text-align: center;
      color: #c0392b;
      font-size: 14px;
      padding: 20px;
    }

    .loading {
      text-align: center;
      color: #8a94a6;
      font-size: 14px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="content" class="loading">Chargement…</div>
  </div>

  <script>
    async function load() {
      try {
        // Ajoute un timestamp pour éviter le cache navigateur
        const res = await fetch('./wifi.json?t=' + Date.now());
        if (!res.ok) throw new Error('Fichier introuvable');
        const data = await res.json();

        const dateStr = data.updated
          ? new Date(data.updated).toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long' })
          : 'aujourd\'hui';

        document.getElementById('content').innerHTML = `
          <div class="header">
            <div class="wifi-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <circle cx="12" cy="20" r="1" fill="currentColor"/>
              </svg>
            </div>
            <div class="header-text">
              <h1>Accès WiFi du jour</h1>
              <p>${dateStr}</p>
            </div>
          </div>

          <div class="ssid-badge">${data.ssid || 'Élèves'}</div>

          <div class="field">
            <div class="field-label">Identifiant</div>
            <div class="field-value">
              <span id="login-val">${data.login}</span>
              <button class="copy-btn" onclick="copyText('login-val', this)">Copier</button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">Mot de passe</div>
            <div class="field-value">
              <span id="pass-val">${data.password}</span>
              <button class="copy-btn" onclick="copyText('pass-val', this)">Copier</button>
            </div>
          </div>

          <div class="footer">
            Codes valables uniquement pour la journée du ${dateStr}
          </div>
        `;
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<div class="error">Impossible de charger les codes.<br>Veuillez contacter le secrétariat.</div>';
      }
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copié';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
      });
    }

    load();
    // Rechargement automatique toutes les 30 minutes
    setInterval(load, 30 * 60 * 1000);
  </script>
</body>
</html>
